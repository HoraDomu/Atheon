name: npm-install-script
category: supply-chain
severity: medium
cwe: "CWE-1395"
description: "Detects npm package with install scripts that may execute arbitrary code"
match: "install"\\s*:\\s*"[^"]*(?:node|bash|python|npm|sh)"
remediation: "Review package install scripts carefully. Only install from trusted publishers."
enabled: true
tags:
  - supply-chain
  - npm
  - arbitrary-code-execution
standards:
  - supply-chain-security
